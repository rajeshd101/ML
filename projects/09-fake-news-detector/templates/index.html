<html>
<head>
  <title>Fake News Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial Black', 'Impact', sans-serif;
      background: #a29bfe;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #6c5ce7;
      border: 4px solid #000;
      box-shadow: 6px 6px 0 #000;
      padding: 30px;
    }
    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 3px 3px 0 #000;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
      text-shadow: 2px 2px 0 #000;
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      font-size: 16px;
      border: 3px solid #000;
      box-shadow: 4px 4px 0 #000;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: bold;
      background: #fd79a8;
      color: #fff;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      cursor: pointer;
      margin-top: 10px;
      text-shadow: 2px 2px 0 #000;
      transition: transform 0.1s;
    }
    button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
    }
    button:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 #000;
    }
    .result {
      margin-top: 24px;
      padding: 20px;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      text-align: center;
    }
    .result h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .real {
      color: #00b894;
    }
    .fake {
      color: #d63031;
    }
    .result .confidence {
      font-size: 16px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      color: #636e72;
      margin-top: 8px;
    }
    .result .preview {
      margin-top: 12px;
      padding: 10px;
      background: #f5f5f5;
      border: 2px solid #000;
      font-size: 14px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      color: #2d3436;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
    }
    .error {
      margin-top: 20px;
      padding: 12px;
      background: #fab1a0;
      border: 4px solid #000;
      color: #2d3436;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 Fake News Detector</h1>
    <form id="newsForm">
      <div class="form-group">
        <label>Paste News Article Text Below</label>
        <textarea id="news_text" placeholder="Paste a news article here to check if it's real or fake..."></textarea>
      </div>
      <button type="submit">🔍 ANALYZE</button>
    </form>
    <div class="result" id="result" style="display:none;">
      <h2 id="resultTitle"></h2>
      <div class="confidence" id="resultConfidence"></div>
      <div class="preview" id="resultPreview"></div>
    </div>
    <div class="error" id="error" style="display:none;"></div>
    <script>
      document.getElementById('newsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const text = document.getElementById('news_text').value;
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        result.style.display = 'none';
        error.style.display = 'none';
        try {
          const res = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({news_text: text})
          });
          const data = await res.json();
          if (data.error) { throw new Error(data.error); }
          const isReal = data.prediction === 'REAL';
          document.getElementById('resultTitle').textContent = isReal ? '✅ REAL NEWS' : '🚫 FAKE NEWS';
          document.getElementById('resultTitle').className = isReal ? 'real' : 'fake';
          document.getElementById('resultConfidence').textContent = 'Confidence: ' + data.confidence + '%';
          document.getElementById('resultPreview').textContent = text.substring(0, 200) + (text.length > 200 ? '...' : '');
          result.style.display = 'block';
        } catch(err) {
          error.textContent = 'Error: ' + err.message;
          error.style.display = 'block';
        }
      });
    </script>
  </div>
</body>
</html>
