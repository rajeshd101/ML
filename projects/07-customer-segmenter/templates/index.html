<!DOCTYPE html>
<html>
<head>
    <title>Customer Segmenter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #ffec99;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff0b3;
            border: 4px solid #000;
            box-shadow: 8px 8px 0 #000;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 30px;
            color: #000;
            text-shadow: 3px 3px 0 #ffa94d;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 1.2em;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 12px;
            -webkit-appearance: none;
            background: #ffa94d;
            border: 3px solid #000;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            border: 3px solid #000;
            cursor: pointer;
        }
        .value-display {
            font-size: 1.5em;
            font-weight: bold;
            text-align: right;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 18px;
            font-size: 1.8em;
            font-weight: bold;
            background: #51cf66;
            border: 4px solid #000;
            box-shadow: 6px 6px 0 #000;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.1s;
            font-family: 'Arial Black', sans-serif;
        }
        button:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 #000;
        }
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #000;
        }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #d3f9d8;
            border: 4px solid #000;
            box-shadow: 6px 6px 0 #000;
            display: none;
        }
        .result.show { display: block; }
        .result .emoji { font-size: 4em; text-align: center; margin-bottom: 10px; }
        .result .segment-name { font-size: 2em; text-align: center; margin-bottom: 5px; }
        .result .segment-desc { font-size: 1.1em; text-align: center; color: #333; }
        .error {
            background: #ffc9c9;
            border: 4px solid #000;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.3em;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Customer Segmenter</h1>
        <form id="segmentForm">
            <div class="form-group">
                <label>Age: <span id="ageVal">30</span></label>
                <input type="range" id="age" name="age" min="18" max="70" value="30">
            </div>
            <div class="form-group">
                <label>Annual Income (k$): <span id="incomeVal">60</span></label>
                <input type="range" id="annual_income" name="annual_income" min="15" max="140" value="60">
            </div>
            <div class="form-group">
                <label>Spending Score (1-100): <span id="scoreVal">50</span></label>
                <input type="range" id="spending_score" name="spending_score" min="1" max="100" value="50">
            </div>
            <button type="submit">SEGMENT ME! 🎯</button>
        </form>
        <div class="result" id="result">
            <div class="emoji" id="resultEmoji">🌟</div>
            <div class="segment-name" id="resultName">Young Explorers</div>
            <div class="segment-desc" id="resultDesc">Description here</div>
        </div>
        <div class="error" id="error"></div>
    </div>

    <script>
        // Update slider displays
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            slider.addEventListener('input', function() {
                const spanId = this.id + 'Val';
                document.getElementById(spanId).textContent = this.value;
            });
        });

        document.getElementById('segmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            try {
                const response = await fetch('/segment', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.classList.add('show');
                    resultDiv.classList.remove('show');
                    return;
                }
                
                errorDiv.classList.remove('show');
                document.getElementById('resultEmoji').textContent = data.emoji;
                document.getElementById('resultName').textContent = data.name;
                document.getElementById('resultDesc').textContent = data.description;
                resultDiv.classList.add('show');
            } catch (err) {
                errorDiv.textContent = 'Error connecting to server. Make sure the app is running.';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>
