<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Recommender</title>
    <style>
        /* Cartoon Brutalist Style */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #a8e6cf;
            border: 5px solid #222;
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
            box-shadow: 12px 12px 0 #222;
        }
        h1 {
            font-size: 2.4rem;
            color: #222;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            font-size: 1rem;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            border: 4px solid #222;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 20px;
            box-shadow: inset 3px 3px 0 #ccc;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #e63946;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1.4rem;
            font-family: inherit;
            font-weight: bold;
            background: #ff8c42;
            color: #fff;
            border: 4px solid #222;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 6px 6px 0 #222;
            transition: all 0.06s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #222;
        }
        .btn:hover {
            background: #e67a30;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border: 4px solid #222;
            border-radius: 14px;
            background: #fff;
            box-shadow: 6px 6px 0 #222;
            display: none;
        }
        #result h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #222;
        }
        .rec-list {
            list-style: none;
        }
        .rec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 3px solid #222;
            border-radius: 10px;
            background: #fefae0;
            font-size: 1rem;
            font-weight: bold;
        }
        .rec-item .rank {
            background: #222;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .rec-item .title {
            flex: 1;
            margin: 0 12px;
            color: #222;
        }
        .rec-item .score {
            background: #2a9d8f;
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 2px solid #222;
        }
        .error {
            color: #e63946;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 2rem;
        }
        @media (max-width: 480px) {
            .card { padding: 25px 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎬 Movie Recommender</h1>
        <p class="subtitle">Pick a movie and get 5 similar recommendations</p>
        <select id="movieSelect">
            {% for mid, title in movies %}
            <option value="{{ mid }}">{{ title }}</option>
            {% endfor %}
        </select>
        <button class="btn" id="recommendBtn">🎯 Get Recommendations</button>
        <div class="spinner" id="spinner">⏳</div>
        <div id="result">
            <h3>📺 You might also like...</h3>
            <ul class="rec-list" id="recList"></ul>
        </div>
        <div class="error" id="error">Could not get recommendations. Try again.</div>
    </div>

    <script>
        const btn = document.getElementById('recommendBtn');
        const select = document.getElementById('movieSelect');
        const result = document.getElementById('result');
        const recList = document.getElementById('recList');
        const error = document.getElementById('error');
        const spinner = document.getElementById('spinner');

        btn.addEventListener('click', async () => {
            error.style.display = 'none';
            result.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('movie_id', select.value);
                const res = await fetch('/recommend', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                recList.innerHTML = '';
                data.recommendations.forEach((rec, i) => {
                    const li = document.createElement('li');
                    li.className = 'rec-item';
                    li.innerHTML = `
                        <span class="rank">${i + 1}</span>
                        <span class="title">${rec.title}</span>
                        <span class="score">${(rec.similarity * 100).toFixed(1)}%</span>
                    `;
                    recList.appendChild(li);
                });
                result.style.display = 'block';
            } catch (e) {
                error.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
