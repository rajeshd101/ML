<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Airline Passenger Forecast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #d0ebff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 650px; width: 100%;
            background: #74c0fc;
            border: 5px solid #000;
            box-shadow: 10px 10px 0 #000;
            padding: 35px 30px;
        }
        h1 {
            font-size: 2.2rem; text-align: center; margin-bottom: 25px;
            color: #000; text-shadow: 4px 4px 0 #a5d8ff;
        }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 1.3rem; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] {
            width: 100%; height: 14px;
            -webkit-appearance: none; background: #fff; border: 4px solid #000; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 30px; height: 30px;
            background: #ff6b6b; border: 3px solid #000; cursor: pointer;
        }
        .value-display { font-size: 2rem; font-weight: bold; text-align: center; margin-top: 8px; }
        button {
            width: 100%; padding: 18px; font-size: 1.8rem; font-weight: bold;
            background: #ff922b; border: 5px solid #000;
            box-shadow: 8px 8px 0 #000; cursor: pointer; transition: all 0.08s;
            font-family: 'Arial Black', sans-serif;
        }
        button:hover { transform: translate(3px,3px); box-shadow: 5px 5px 0 #000; }
        button:active { transform: translate(6px,6px); box-shadow: 2px 2px 0 #000; }
        .result {
            margin-top: 25px; padding: 20px; background: #fff;
            border: 5px solid #000; box-shadow: 8px 8px 0 #000; display: none;
        }
        .result.show { display: block; }
        .result h3 { font-size: 1.3rem; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-family: 'Courier New', monospace; font-weight: bold; }
        th, td { border: 3px solid #000; padding: 10px; text-align: center; font-size: 1rem; }
        th { background: #ffd8a8; }
        td { background: #fff; }
        .error {
            margin-top: 20px; padding: 15px; background: #ffc9c9;
            border: 4px solid #000; font-weight: bold; text-align: center; display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ Airline Passenger Forecast</h1>
        <div class="form-group">
            <label>Months to Forecast: <span id="monthVal">6</span></label>
            <input type="range" id="months" min="1" max="24" value="6">
            <div class="value-display" id="bigMonth">6 months</div>
        </div>
        <button id="forecastBtn">🔮 FORECAST</button>
        <div class="result" id="result">
            <h3>📊 Predicted Passengers (thousands)</h3>
            <table><thead><tr><th>Month</th><th>Passengers</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
        <div class="error" id="error"></div>
    </div>
    <script>
        const slider = document.getElementById('months');
        const monthVal = document.getElementById('monthVal');
        const bigMonth = document.getElementById('bigMonth');
        slider.addEventListener('input', function() {
            monthVal.textContent = this.value;
            bigMonth.textContent = this.value + ' month' + (this.value !== '1' ? 's' : '');
        });
        document.getElementById('forecastBtn').addEventListener('click', async function() {
            const months = slider.value;
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const tbody = document.getElementById('tableBody');
            result.classList.remove('show');
            error.classList.remove('show');
            this.disabled = true; this.textContent = 'LOADING...';
            try {
                const res = await fetch('/predict?months=' + months);
                const data = await res.json();
                if (data.status !== 'success') throw new Error('API error');
                tbody.innerHTML = '';
                for (const [date, val] of Object.entries(data.predictions)) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td>' + date + '</td><td>' + val.toLocaleString() + '</td>';
                    tbody.appendChild(tr);
                }
                result.classList.add('show');
            } catch (err) {
                error.textContent = 'Error: ' + err.message;
                error.classList.add('show');
            } finally {
                this.disabled = false; this.textContent = '🔮 FORECAST';
            }
        });
    </script>
</body>
</html>
